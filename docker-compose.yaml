services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: always
    # Postiz connects to Temporal during boot and exits if it is not reachable.
    # Temporal only becomes reachable after Elasticsearch (~30-60s), so wait for
    # its port before launching the app instead of crash-looping into Coolify's
    # restart limit. Falls back to starting anyway after ~6 minutes. The default
    # CMD (nginx && pnpm run pm2) is preserved.
    command:
      - /bin/sh
      - -c
      - |
        touch /tmp/postiz-starting;
        echo "Waiting for Temporal ($${TEMPORAL_ADDRESS:-temporal:7233}) to accept connections...";
        i=0;
        until node -e 'const net=require("net");const a=(process.env.TEMPORAL_ADDRESS||"temporal:7233").split(":");const s=net.connect(+a[1]||7233,a[0]);s.on("connect",()=>{s.end();process.exit(0)});s.on("error",()=>process.exit(1));setTimeout(()=>process.exit(1),2000);' 2>/dev/null; do
          i=$$((i+1));
          if [ "$$i" -ge 120 ]; then echo "Temporal still unreachable after ~6m; starting Postiz anyway."; break; fi
          echo "Temporal not ready (attempt $$i); retrying in 3s...";
          sleep 3;
        done;
        echo "Temporal reachable; starting Postiz.";
        nginx && { rm -f /tmp/postiz-starting; pnpm run pm2; }
    # Report healthy while waiting for Temporal (marker file exists) or once the
    # frontend port is listening, so the container is never marked unhealthy and
    # restarted during the wait. Port 5000 = 0x1388 in /proc/net/tcp, state 0A.
    healthcheck:
      test:
        - CMD-SHELL
        - "[ -f /tmp/postiz-starting ] || grep -qsE ':1388 [0-9A-F]+:0000 0A' /proc/net/tcp /proc/net/tcp6"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      # === Required Settings
      MAIN_URL: '${MAIN_URL:-http://localhost:4007}'
      FRONTEND_URL: '${FRONTEND_URL:-http://localhost:4007}'
      NEXT_PUBLIC_BACKEND_URL: '${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4007/api}'
      JWT_SECRET: '${JWT_SECRET:-random string that is unique to every install - just type random characters here!}'
      DATABASE_URL: '${DATABASE_URL:-postgresql://${POSTIZ_POSTGRES_USER:-postiz-user}:${POSTIZ_POSTGRES_PASSWORD:-postiz-password}@postiz-postgres:5432/${POSTIZ_POSTGRES_DB:-postiz-db-local}}'
      REDIS_URL: '${REDIS_URL:-redis://postiz-redis:6379}'
      BACKEND_INTERNAL_URL: '${BACKEND_INTERNAL_URL:-http://localhost:3000}'
      TEMPORAL_ADDRESS: '${TEMPORAL_ADDRESS:-temporal:7233}'
      IS_GENERAL: '${IS_GENERAL:-true}'
      DISABLE_REGISTRATION: '${DISABLE_REGISTRATION:-false}'

      # === Storage Settings
      STORAGE_PROVIDER: '${STORAGE_PROVIDER:-local}'
      UPLOAD_DIRECTORY: '${UPLOAD_DIRECTORY:-/uploads}'
      NEXT_PUBLIC_UPLOAD_DIRECTORY: '${NEXT_PUBLIC_UPLOAD_DIRECTORY:-/uploads}'

      # === Cloudflare (R2) Settings
      # STORAGE_PROVIDER: 'cloudflare'
      # CLOUDFLARE_ACCOUNT_ID: '${CLOUDFLARE_ACCOUNT_ID:-}'
      # CLOUDFLARE_ACCESS_KEY: '${CLOUDFLARE_ACCESS_KEY:-}'
      # CLOUDFLARE_SECRET_ACCESS_KEY: '${CLOUDFLARE_SECRET_ACCESS_KEY:-}'
      # CLOUDFLARE_BUCKETNAME: '${CLOUDFLARE_BUCKETNAME:-}'
      # CLOUDFLARE_BUCKET_URL: '${CLOUDFLARE_BUCKET_URL:-}'
      # CLOUDFLARE_REGION: '${CLOUDFLARE_REGION:-auto}'

      # === Social Media API Settings
      X_URL: '${X_URL:-}'
      X_API_KEY: '${X_API_KEY:-}'
      X_API_SECRET: '${X_API_SECRET:-}'
      LINKEDIN_CLIENT_ID: '${LINKEDIN_CLIENT_ID:-}'
      LINKEDIN_CLIENT_SECRET: '${LINKEDIN_CLIENT_SECRET:-}'
      REDDIT_CLIENT_ID: '${REDDIT_CLIENT_ID:-}'
      REDDIT_CLIENT_SECRET: '${REDDIT_CLIENT_SECRET:-}'
      GITHUB_CLIENT_ID: '${GITHUB_CLIENT_ID:-}'
      GITHUB_CLIENT_SECRET: '${GITHUB_CLIENT_SECRET:-}'
      BEEHIIVE_API_KEY: '${BEEHIIVE_API_KEY:-}'
      BEEHIIVE_PUBLICATION_ID: '${BEEHIIVE_PUBLICATION_ID:-}'
      THREADS_APP_ID: '${THREADS_APP_ID:-}'
      THREADS_APP_SECRET: '${THREADS_APP_SECRET:-}'
      FACEBOOK_APP_ID: '${FACEBOOK_APP_ID:-}'
      FACEBOOK_APP_SECRET: '${FACEBOOK_APP_SECRET:-}'
      YOUTUBE_CLIENT_ID: '${YOUTUBE_CLIENT_ID:-}'
      YOUTUBE_CLIENT_SECRET: '${YOUTUBE_CLIENT_SECRET:-}'
      TIKTOK_CLIENT_ID: '${TIKTOK_CLIENT_ID:-}'
      TIKTOK_CLIENT_SECRET: '${TIKTOK_CLIENT_SECRET:-}'
      PINTEREST_CLIENT_ID: '${PINTEREST_CLIENT_ID:-}'
      PINTEREST_CLIENT_SECRET: '${PINTEREST_CLIENT_SECRET:-}'
      DRIBBBLE_CLIENT_ID: '${DRIBBBLE_CLIENT_ID:-}'
      DRIBBBLE_CLIENT_SECRET: '${DRIBBBLE_CLIENT_SECRET:-}'
      TUMBLR_CLIENT_ID: '${TUMBLR_CLIENT_ID:-}'
      TUMBLR_CLIENT_SECRET: '${TUMBLR_CLIENT_SECRET:-}'
      DISCORD_CLIENT_ID: '${DISCORD_CLIENT_ID:-}'
      DISCORD_CLIENT_SECRET: '${DISCORD_CLIENT_SECRET:-}'
      DISCORD_BOT_TOKEN_ID: '${DISCORD_BOT_TOKEN_ID:-}'
      SLACK_ID: '${SLACK_ID:-}'
      SLACK_SECRET: '${SLACK_SECRET:-}'
      SLACK_SIGNING_SECRET: '${SLACK_SIGNING_SECRET:-}'
      MASTODON_URL: '${MASTODON_URL:-https://mastodon.social}'
      MASTODON_CLIENT_ID: '${MASTODON_CLIENT_ID:-}'
      MASTODON_CLIENT_SECRET: '${MASTODON_CLIENT_SECRET:-}'

      # === OAuth & Authentik Settings
      # NEXT_PUBLIC_POSTIZ_OAUTH_DISPLAY_NAME: '${NEXT_PUBLIC_POSTIZ_OAUTH_DISPLAY_NAME:-Authentik}'
      # NEXT_PUBLIC_POSTIZ_OAUTH_LOGO_URL: '${NEXT_PUBLIC_POSTIZ_OAUTH_LOGO_URL:-https://raw.githubusercontent.com/walkxcode/dashboard-icons/master/png/authentik.png}'
      # POSTIZ_GENERIC_OAUTH: '${POSTIZ_GENERIC_OAUTH:-false}'
      # POSTIZ_OAUTH_URL: '${POSTIZ_OAUTH_URL:-https://auth.example.com}'
      # POSTIZ_OAUTH_AUTH_URL: '${POSTIZ_OAUTH_AUTH_URL:-https://auth.example.com/application/o/authorize}'
      # POSTIZ_OAUTH_TOKEN_URL: '${POSTIZ_OAUTH_TOKEN_URL:-https://auth.example.com/application/o/token}'
      # POSTIZ_OAUTH_USERINFO_URL: '${POSTIZ_OAUTH_USERINFO_URL:-https://authentik.example.com/application/o/userinfo}'
      # POSTIZ_OAUTH_CLIENT_ID: '${POSTIZ_OAUTH_CLIENT_ID:-}'
      # POSTIZ_OAUTH_CLIENT_SECRET: '${POSTIZ_OAUTH_CLIENT_SECRET:-}'
      # POSTIZ_OAUTH_SCOPE: '${POSTIZ_OAUTH_SCOPE:-openid profile email}'  # Optional: uncomment to override default scope

      # === Sentry

      # NEXT_PUBLIC_SENTRY_DSN: '${NEXT_PUBLIC_SENTRY_DSN:-http://spotlight:8969/stream}'
      # SENTRY_SPOTLIGHT: '${SENTRY_SPOTLIGHT:-1}'

      # === Misc Settings
      OPENAI_API_KEY: '${OPENAI_API_KEY:-}'
      NEXT_PUBLIC_DISCORD_SUPPORT: '${NEXT_PUBLIC_DISCORD_SUPPORT:-}'
      NEXT_PUBLIC_POLOTNO: '${NEXT_PUBLIC_POLOTNO:-}'
      API_LIMIT: '${API_LIMIT:-30}'

      # === Payment / Stripe Settings
      FEE_AMOUNT: '${FEE_AMOUNT:-0.05}'
      STRIPE_PUBLISHABLE_KEY: '${STRIPE_PUBLISHABLE_KEY:-}'
      STRIPE_SECRET_KEY: '${STRIPE_SECRET_KEY:-}'
      STRIPE_SIGNING_KEY: '${STRIPE_SIGNING_KEY:-}'
      STRIPE_SIGNING_KEY_CONNECT: '${STRIPE_SIGNING_KEY_CONNECT:-}'

      # === Developer Settings
      NX_ADD_PLUGINS: '${NX_ADD_PLUGINS:-false}'

      # === Short Link Service Settings (Optional - leave blank if unused)
      # DUB_TOKEN: '${DUB_TOKEN:-}'
      # DUB_API_ENDPOINT: '${DUB_API_ENDPOINT:-https://api.dub.co}'
      # DUB_SHORT_LINK_DOMAIN: '${DUB_SHORT_LINK_DOMAIN:-dub.sh}'
      # SHORT_IO_SECRET_KEY: '${SHORT_IO_SECRET_KEY:-}'
      # KUTT_API_KEY: '${KUTT_API_KEY:-}'
      # KUTT_API_ENDPOINT: '${KUTT_API_ENDPOINT:-https://kutt.it/api/v2}'
      # KUTT_SHORT_LINK_DOMAIN: '${KUTT_SHORT_LINK_DOMAIN:-kutt.it}'
      # LINK_DRIP_API_KEY: '${LINK_DRIP_API_KEY:-}'
      # LINK_DRIP_API_ENDPOINT: '${LINK_DRIP_API_ENDPOINT:-https://api.linkdrip.com/v1/}'
      # LINK_DRIP_SHORT_LINK_DOMAIN: '${LINK_DRIP_SHORT_LINK_DOMAIN:-dripl.ink}'

    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    ports:
      - '${POSTIZ_PORT:-4007}:5000'
    networks:
      - postiz-network
      - temporal-network
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: '${POSTIZ_POSTGRES_PASSWORD:-postiz-password}'
      POSTGRES_USER: '${POSTIZ_POSTGRES_USER:-postiz-user}'
      POSTGRES_DB: '${POSTIZ_POSTGRES_DB:-postiz-db-local}'
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: pg_isready -U ${POSTIZ_POSTGRES_USER:-postiz-user} -d ${POSTIZ_POSTGRES_DB:-postiz-db-local}
      interval: 10s
      timeout: 3s
      retries: 3
  postiz-redis:
    image: redis:7.2
    container_name: postiz-redis
    restart: always
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network

  # For Application Monitoring / Debugging
  spotlight:
    pull_policy: always
    container_name: spotlight
    ports:
      - '${SPOTLIGHT_PORT:-8969}:8969/tcp'
    image: ghcr.io/getsentry/spotlight:latest
    networks:
      - postiz-network

  # -----------------------
  # Temporal Stack
  # -----------------------
  temporal-elasticsearch:
    container_name: temporal-elasticsearch
    image: elasticsearch:7.17.27
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - temporal-network
    expose:
      - 9200
    volumes:
      - /var/lib/elasticsearch/data

  temporal-postgresql:
    container_name: temporal-postgresql
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: '${TEMPORAL_POSTGRES_PASSWORD:-temporal}'
      POSTGRES_USER: '${TEMPORAL_POSTGRES_USER:-temporal}'
    networks:
      - temporal-network
    expose:
      - 5432
    volumes:
      - /var/lib/postgresql/data

  temporal:
    container_name: temporal
    ports:
      - '${TEMPORAL_PORT:-7233}:7233'
    image: temporalio/auto-setup:1.28.1
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_POSTGRES_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_POSTGRES_PASSWORD:-temporal}
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    networks:
      - temporal-network
    # The dynamic config is embedded here (compose "configs") instead of a
    # relative bind mount of ./dynamicconfig, because relative bind mounts do
    # not resolve to the repo on some hosts (e.g. Coolify) and Docker then
    # mounts an empty dir, so Temporal cannot find development-sql.yaml and its
    # server never starts. The target matches DYNAMIC_CONFIG_FILE_PATH.
    configs:
      - source: temporal-dynamicconfig
        target: /etc/temporal/config/dynamicconfig/development-sql.yaml
    labels:
      kompose.volume.type: configMap

  temporal-admin-tools:
    container_name: temporal-admin-tools
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - temporal-network
    stdin_open: true
    depends_on:
      - temporal
    tty: true

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:2.34.0
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://127.0.0.1:3000
    networks:
      - temporal-network
    # The Temporal web UI is optional and only used for debugging. It is not
    # published on the host to avoid host port conflicts (e.g. 8080 already in
    # use). To expose it, set TEMPORAL_UI_PORT and uncomment the mapping below.
    # ports:
    #   - '${TEMPORAL_UI_PORT:-8080}:8080'

configs:
  temporal-dynamicconfig:
    content: |
      limit.maxIDLength:
        - value: 255
          constraints: {}
      system.forceSearchAttributesCacheRefreshOnRead:
        - value: true # Dev setup only. Please don't turn this on in production.
          constraints: {}

volumes:
  postgres-volume:
    external: false

  postiz-redis-data:
    external: false

  postiz-config:
    external: false

  postiz-uploads:
    external: false

networks:
  postiz-network:
    external: false
  temporal-network:
    driver: bridge
    name: temporal-network
